name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "assets/examples/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install docs dependencies
        run: pip install "mkdocs>=1.6" "mkdocs-material>=9.5"
      - name: Sync example assets into docs/
        # The site renders from docs/; canonical examples live in assets/examples/.
        # Copy (not symlink) so Windows clones and GH Pages both work.
        run: |
          mkdir -p docs/examples/animation_knight docs/examples/tileset_overworld
          cp assets/examples/*.png docs/examples/ 2>/dev/null || true
          cp assets/examples/animation_knight/knight_walk.gif docs/examples/animation_knight/
          cp assets/examples/animation_knight/knight_walk.png docs/examples/animation_knight/
          cp assets/examples/tileset_overworld/overworld.png docs/examples/tileset_overworld/
      - name: Build site
        run: mkdocs build --strict
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
